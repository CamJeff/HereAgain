<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Cam Jeffery | Jane Street Puzzles</title>

  <!-- Optional: keep these if your site uses them elsewhere -->
  <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/materialize/0.95.3/css/materialize.min.css" />
  <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" />

  <!-- Reuse the Puzzles styling for consistency -->
  <link rel="stylesheet" href="../puzzles.css" />

  <!-- Page-specific layout only -->
  <style>
    /* Make the top buttons sit side-by-side */
    .page-hero-top {
      gap: 12px;
      flex-wrap: wrap;
    }

    /* 3 columns max, responsive to 2/1 */
    .card-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      margin-top: 10px;
    }

    /* Center the content in each card for this page */
    .card-grid .puzzle-card-inner{
      padding: 26px 24px;
      display: block;
    }

    .card-grid .puzzle-copy h3{
      margin: 0;
    }

    .card-grid .muted{
      margin-top: 10px;
      max-width: none;
    }

    @media (max-width: 980px){
      .card-grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px){
      .card-grid{ grid-template-columns: 1fr; }
    }
  </style>

  <meta name="author" content="Cam Jeffery" />
  <meta name="description" content="Jane Street puzzle writeups." />
  <meta name="robots" content="index, follow" />
</head>
